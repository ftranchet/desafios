name: CI

# Los mismos checks que corren antes del deploy (deploy.yml), pero en ramas y
# pull requests: una rama rota se entera al pushear, no al llegar a main.
on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: npm
      - run: npm ci
      - run: npm run audit
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build:bundle
      # E2E de humo contra el build de producción (PRD 5.6).
      - run: npx playwright install --with-deps chromium webkit
      - run: npm run test:e2e:run
        env:
          CI: 'true'
