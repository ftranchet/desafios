<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f2fa" />
    <script>
      // Aplica el tema guardado ANTES del primer paint (evita el flash de tema
      // claro para quien eligió oscuro). La fuente de verdad vive en el store
      // del shell (dm:settings); esto solo lee la preferencia ya persistida.
      (function () {
        var theme = 'light';
        try {
          var raw = localStorage.getItem('dm:settings');
          var pref = raw ? JSON.parse(raw).state.theme : null;
          if (pref === 'dark') theme = 'dark';
          else if (pref === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
            theme = 'dark';
        } catch (e) {
          /* almacenamiento bloqueado o corrupto: queda el tema claro por defecto */
        }
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <meta
      name="description"
      content="Desafíos Mentales — juegos mentales de matemática, lógica, memoria, velocidad y razonamiento espacial. Sin publicidad, sin cuentas."
    />
    <link rel="icon" type="image/png" href="/desafios/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/desafios/icons/icon-192.png" />
    <title>Desafíos Mentales</title>
  </head>
  <body class="bg-bg text-text-primary font-body">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
